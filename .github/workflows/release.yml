name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish-windows:
    name: Publish Windows release
    runs-on: windows-latest
    env:
      BUREAU_UPDATE_URL: https://github.com/${{ github.repository }}/releases/latest/download
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify the tag matches the application version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH."
          }
          $version = node -p "require('./package.json').version"
          if ($tag -ne "v$version") {
            throw "Tag $tag does not match package.json version $version."
          }

      - name: Install dependencies
        run: npm ci

      - name: Verify the release candidate
        run: |
          npm run typecheck
          npm run lint
          npm run test:security
          npm run test:unit
          npm run test:integration
          npm run test:component

      - name: Build the NSIS installer and update manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx electron-forge make --platform=win32 --arch=x64

      - name: Validate and publish the NSIS draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem -Path out/make/nsis -Recurse -Filter '*.exe' -File | Select-Object -First 1
          $blockmap = Get-ChildItem -Path out/make/nsis -Recurse -Filter '*.blockmap' -File | Select-Object -First 1
          $manifest = Get-ChildItem -Path out/make/nsis -Recurse -Filter 'latest.yml' -File | Select-Object -First 1
          if (!$installer -or !$blockmap -or !$manifest) {
            throw 'The NSIS maker must produce an installer, blockmap, and latest.yml update manifest.'
          }

          $manifestText = Get-Content -LiteralPath $manifest.FullName -Raw
          if (!$manifestText.Contains("url: $($installer.Name)") -or !$manifestText.Contains("path: $($installer.Name)")) {
            throw "latest.yml does not reference the installer filename $($installer.Name)."
          }

          $releasesJson = & gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100"
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not inspect the draft release created by the NSIS maker.'
          }
          $drafts = @($releasesJson | ConvertFrom-Json | Where-Object {
            $_.tag_name -eq $env:GITHUB_REF_NAME -and $_.draft
          })
          if ($drafts.Count -ne 1) {
            throw "Expected exactly one draft release for $env:GITHUB_REF_NAME, found $($drafts.Count)."
          }

          $draft = $drafts[0]
          $remoteAssets = @($draft.assets | ForEach-Object { $_.name })
          foreach ($expectedAsset in @($installer.Name, $blockmap.Name, $manifest.Name)) {
            if ($expectedAsset -notin $remoteAssets) {
              throw "The NSIS draft omitted release asset $expectedAsset; latest.yml would be invalid."
            }
          }

          $remoteManifestAsset = $draft.assets | Where-Object { $_.name -eq $manifest.Name } | Select-Object -First 1
          $remoteManifestText = & gh api "repos/$env:GITHUB_REPOSITORY/releases/assets/$($remoteManifestAsset.id)" -H 'Accept: application/octet-stream' | Out-String
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not validate the uploaded latest.yml.'
          }
          if (!$remoteManifestText.Contains("url: $($installer.Name)") -or !$remoteManifestText.Contains("path: $($installer.Name)")) {
            throw "The uploaded latest.yml does not reference $($installer.Name)."
          }

          $notesRequest = @{
            tag_name = $env:GITHUB_REF_NAME
            target_commitish = $env:GITHUB_SHA
          } | ConvertTo-Json -Compress
          $notesJson = $notesRequest | & gh api --method POST "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" --input -
          if ($LASTEXITCODE -ne 0) {
            throw 'GitHub could not generate the release notes.'
          }
          $notes = $notesJson | ConvertFrom-Json

          $publishRequest = @{
            name = "Bureau $env:GITHUB_REF_NAME"
            body = $notes.body
            draft = $false
            prerelease = $false
            make_latest = 'true'
          } | ConvertTo-Json -Compress
          $releaseJson = $publishRequest | & gh api --method PATCH "repos/$env:GITHUB_REPOSITORY/releases/$($draft.id)" --input -
          if ($LASTEXITCODE -ne 0) {
            throw 'GitHub Release publication failed.'
          }

          $release = $releaseJson | ConvertFrom-Json
          if ($release.draft -or $release.prerelease) {
            throw 'The update channel requires a published, non-prerelease GitHub Release.'
          }
          $publishedAssets = @($release.assets | ForEach-Object { $_.name })
          foreach ($expectedAsset in @($installer.Name, $blockmap.Name, $manifest.Name)) {
            if ($expectedAsset -notin $publishedAssets) {
              throw "GitHub renamed or omitted release asset $expectedAsset; latest.yml would be invalid."
            }
          }
