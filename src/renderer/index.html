<!doctype html>
<html lang="en" data-theme="dark" data-density="compact">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bureau</title>
    <style>
      :root {
        --boot-canvas: #141414;
        --boot-text: #ededed;
        --boot-muted: #7a7a7a;
        --boot-accent: #7c9cff;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--boot-canvas);
      }

      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--boot-canvas);
        color: var(--boot-text);
        opacity: 1;
        transition: opacity 220ms ease-out;
        pointer-events: none;
      }

      #boot.boot--exit {
        opacity: 0;
      }

      .boot__mark {
        display: block;
        width: 52px;
        height: 52px;
        object-fit: contain;
        animation: boot-in 420ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .boot__word {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        animation: boot-in 420ms cubic-bezier(0.16, 1, 0.3, 1) 120ms both;
      }

      .boot__line {
        width: 92px;
        height: 2px;
        border-radius: 999px;
        background: rgba(124, 156, 255, 0.22);
        overflow: hidden;
        position: relative;
      }

      .boot__line::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 40%;
        border-radius: inherit;
        background: var(--boot-accent);
        animation: boot-line 1100ms cubic-bezier(0.2, 0, 0, 1) infinite;
      }

      @keyframes boot-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes boot-line {
        from {
          transform: translateX(-120%);
        }
        to {
          transform: translateX(280%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot__mark,
        .boot__word,
        .boot__line::after {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot" aria-hidden="true">
      <img class="boot__mark" src="../../assets/icons/icon-64.png" alt="" width="52" height="52" />
      <p class="boot__word">Bureau</p>
      <div class="boot__line"></div>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
